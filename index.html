<!DOCTYPE html>
<html lang="pt-PT">

<head>

    <title>Laboratório de UX: Padrões de Cancelamento</title>
    <link rel="icon" type="image/svg+xml" href="./assets/darkfavicon.svg">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
